<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4K超清壁纸 - 免费手机壁纸大全</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:"微软雅黑",sans-serif;background:#f5f5f5;color:#333;}
        
        /* 头部导航 */
        header{background:#222;color:#fff;padding:15px;text-align:center;}
        header h1{font-size:20px;}

        /* 广告位1 顶部广告 */
        .ad-top{width:100%;height:80px;background:#eee;margin:10px 0;display:flex;align-items:center;justify-content:center;border:1px dashed #999;}

        /* 分类导航 */
        .category{display:flex;flex-wrap:wrap;gap:10px;padding:10px;}
        .category a{flex:1;min-width:80px;text-align:center;padding:10px;background:#fff;border-radius:6px;text-decoration:none;color:#333;font-size:14px;}
        .category a:hover{background:#0066cc;color:#fff;}

        /* 壁纸瀑布流 */
        .container{padding:10px;display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
        .wall-item{background:#fff;border-radius:8px;overflow:hidden;}
        .wall-item img{width:100%;height:auto;display:block;}
        .wall-item p{text-align:center;padding:8px;font-size:14px;}

        /* 广告位2 中间信息流广告 */
        .ad-middle{width:100%;height:100px;background:#eee;margin:20px 0;display:flex;align-items:center;justify-content:center;border:1px dashed #999;}

        /* 详情页容器 默认隐藏 */
        .detail{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);z-index:999;display:none;flex-direction:column;align-items:center;justify-content:center;padding:20px;}
        .detail img{max-width:90%;max-height:70vh;border-radius:8px;}
        .download-btn{margin-top:20px;padding:12px 30px;background:#0066cc;color:#fff;border:none;border-radius:6px;font-size:16px;}

        /* 底部广告位3 */
        .ad-bottom{width:100%;height:60px;background:#eee;margin:20px 0;display:flex;align-items:center;justify-content:center;border:1px dashed #999;}

        /* 底部版权 */
        footer{text-align:center;padding:15px;font-size:12px;color:#666;}
    </style>
</head>
<body>

<!-- 头部 -->
<header>
    <h1>4K超清手机壁纸</h1>
</header>

<!-- 广告位1：顶部预留广告 -->
<div class="ad-top">【此处预留顶部广告位】</div>

<!-- 分类导航 -->
<div class="category">
    <a href="#">全部壁纸</a>
    <a href="#">风景ins</a>
    <a href="#">动漫二次元</a>
    <a href="#">简约纯色</a>
    <a href="#">美女高清</a>
    <a href="#">男生霸气</a>
</div>

<!-- 壁纸列表 -->
<div class="container">
    <div class="wall-item" onclick="openDetail('https://picsum.photos/720/1280?random=1')">
        <img src="https://picsum.photos/720/1280?random=1" alt="手机壁纸">
        <p>唯美风景壁纸</p>
    </div>
    <div class="wall-item" onclick="openDetail('https://picsum.photos/720/1280?random=2')">
        <img src="https://picsum.photos/720/1280?random=2" alt="手机壁纸">
        <p>简约ins风</p>
    </div>
    <div class="wall-item" onclick="openDetail('https://picsum.photos/720/1280?random=3')">
        <img src="https://picsum.photos/720/1280?random=3" alt="手机壁纸">
        <p>动漫二次元</p>
    </div>
    <div class="wall-item" onclick="openDetail('https://picsum.photos/720/1280?random=4')">
        <img src="https://picsum.photos/720/1280?random=4" alt="手机壁纸">
        <p>极简纯色</p>
    </div>
</div>

<!-- 广告位2：中间信息流广告 -->
<div class="ad-middle">【此处预留中间广告位】</div>

<!-- 详情弹窗 + 下载按钮 -->
<div class="detail" id="detailBox">
    <img src="" alt="壁纸大图" id="detailImg">
    <button class="download-btn">立即下载壁纸</button>
</div>

<!-- 广告位3：底部广告 -->
<div class="ad-bottom">【此处预留底部广告位】</div>

<!-- 底部版权 -->
<footer>
    4K超清壁纸大全 © 2025 免费无水印下载
</footer>

<script>
// 打开壁纸详情
function openDetail(imgUrl){
    document.getElementById('detailImg').src = imgUrl;
    document.getElementById('detailBox').style.display = 'flex';
}
// 点击空白关闭详情
document.getElementById('detailBox').onclick = function(e){
    if(e.target === this){
        this.style.display = 'none';
    }
}
</script>

</body>
</html>
